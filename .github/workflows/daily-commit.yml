name: Daily Commit

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 24f2004625@ds.study.iitm.ac.in - Create daily commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Daily update: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> daily-log.txt
          git add daily-log.txt
          git commit -m "chore: automated daily commit $(date -u '+%Y-%m-%d')"
          git push
