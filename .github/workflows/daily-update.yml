name: Daily Repository Update

on:
  schedule:
    # Runs every day at 09:15 UTC (specific time, no wildcards)
    - cron: '15 9 * * *'
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 24f2004625@ds.study.iitm.ac.in - Generate daily update
        run: |
          echo "Last updated on $(date -u)" >> daily-log.txt

      - name: Commit and push changes
        run: |
          git config user.name "DevSync Automation Bot"
          git config user.email "24f2004625@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily update: $(date -u)" || echo "No changes to commit"
          git push
